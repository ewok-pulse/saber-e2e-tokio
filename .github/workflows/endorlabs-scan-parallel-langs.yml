#     ubuntu-latest runner memory budget. Each shard scans one top-level
#     subtree with full reachability preserved.
#
name: Endor Labs Scan
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      rust-tokio-stream: ${{ steps.filter.outputs.rust-tokio-stream }}
      rust-tokio: ${{ steps.filter.outputs.rust-tokio }}
      rust-benches: ${{ steps.filter.outputs.rust-benches }}
      rust-examples: ${{ steps.filter.outputs.rust-examples }}
      rust-tests-build: ${{ steps.filter.outputs.rust-tests-build }}
      rust-tests-integration: ${{ steps.filter.outputs.rust-tests-integration }}
      rust-other: ${{ steps.filter.outputs.rust-other }}
      rust-root: ${{ steps.filter.outputs.rust-root }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            rust-tokio-stream:
              - tokio-stream/**/'**/Cargo.toml'
              - tokio-stream/**/'**/Cargo.lock'
              - tokio-stream/**/'**/*.rs'
            rust-tokio:
              - tokio/**/'**/Cargo.toml'
              - tokio/**/'**/Cargo.lock'
              - tokio/**/'**/*.rs'
            rust-benches:
              - benches/**/'**/Cargo.toml'
              - benches/**/'**/Cargo.lock'
              - benches/**/'**/*.rs'
            rust-examples:
              - examples/**/'**/Cargo.toml'
              - examples/**/'**/Cargo.lock'
              - examples/**/'**/*.rs'
            rust-tests-build:
              - tests-build/**/'**/Cargo.toml'
              - tests-build/**/'**/Cargo.lock'
              - tests-build/**/'**/*.rs'
            rust-tests-integration:
              - tests-integration/**/'**/Cargo.toml'
              - tests-integration/**/'**/Cargo.lock'
              - tests-integration/**/'**/*.rs'
            rust-other:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
            rust-root:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
  scan-rust-tokio-stream-pr:
    name: "PR Scan: rust (tokio-stream)"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.rust-tokio-stream == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: endorlabs/github-action@f46ffb04c928a9c9c356f9627bd60b710ed0963e
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=rust --include-path=tokio-stream/** --exclude-path=stress-test/** --exclude-path=tokio-test/** --quick-scan"
  scan-rust-tokio-stream-monitor:
