# ─────────────────────────────────────────────────────────────────
#
# Saber split one or more scan units to fit standard runner memory:
#   • rust: 8 shards (tokio-stream, tokio, benches, examples, tests-build, tests-integration, other, root)
#     Saber split the rust scan into multiple jobs because this repo has 11
